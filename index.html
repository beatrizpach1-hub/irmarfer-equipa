<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irmarfer Structures — Equipa</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM
═══════════════════════════════════════════════════ */
:root {
  --bg: #0d0f14;
  --surface: #141720;
  --surface2: #1a1f2e;
  --surface3: #202636;
  --border: #262d42;
  --border2: #2f3854;
  --accent: #f97316;
  --accent-dim: rgba(249,115,22,0.12);
  --accent-glow: rgba(249,115,22,0.25);
  --blue: #5b8df8;
  --green: #34d399;
  --yellow: #fbbf24;
  --red: #f87171;
  --purple: #a78bfa;
  --text: #e2e6f0;
  --text2: #7e899e;
  --text3: #454f66;
  --r: 12px;
  --r-sm: 8px;
  --sidebar-w: 248px;
  --shadow: 0 4px 24px rgba(0,0,0,0.45);
  --shadow-lg: 0 16px 56px rgba(0,0,0,0.6);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; height: 100%; overflow: hidden; }

/* ═══ LOGIN ═══ */
#loginScreen {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(249,115,22,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 90%, rgba(91,141,248,0.05) 0%, transparent 70%),
    var(--bg);
}
.login-card {
  width: 100%; max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 44px 40px 40px;
  box-shadow: var(--shadow-lg);
  animation: fadeUp 0.4s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.login-logo { text-align: center; margin-bottom: 10px; }
.login-logo img { height: 50px; object-fit: contain; max-width: 230px; }
.login-subtitle { text-align: center; font-size: 11px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
.login-label { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px; }
.login-input-wrap { position: relative; margin-bottom: 14px; }
.login-input-wrap .login-prefix {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 13px; color: var(--text3); pointer-events: none;
  font-family: "DM Mono", monospace;
}
.login-input {
  width: 100%; padding: 12px 14px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-sm); color: var(--text);
  font-family: "DM Sans", sans-serif; font-size: 14px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.login-input.with-prefix { padding-left: 44px; font-family: "DM Mono", monospace; font-size: 14px; }
.login-remember { display: flex; align-items: center; gap: 8px; margin: 4px 0 20px; }
.login-remember input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
.login-remember label { font-size: 12px; color: var(--text2); cursor: pointer; user-select: none; }
.btn-login {
  width: 100%; padding: 13px;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--r-sm);
  font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.3px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
}
.btn-login:hover:not(:disabled) { background: #fb923c; box-shadow: 0 6px 20px rgba(249,115,22,0.35); transform: translateY(-1px); }
.btn-login:disabled { opacity: 0.55; cursor: not-allowed; }
.login-error {
  background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
  border-radius: var(--r-sm); padding: 10px 12px;
  font-size: 12px; color: var(--red); margin-bottom: 14px; display: none;
}
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: rotate 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes rotate { to { transform: rotate(360deg); } }

/* ═══ APP ═══ */
#app { display: none; height: 100vh; }
.app-layout { display: flex; height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sb-logo {
  background: #000; padding: 16px 14px;
  display: flex; align-items: center; justify-content: center;
  border-bottom: 1px solid var(--border); min-height: 80px;
}
.sb-logo img { height: 50px; object-fit: contain; max-width: 210px; }
.sb-user {
  margin: 12px 10px; padding: 10px 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-sm);
  display: flex; align-items: center; gap: 9px;
}
.sb-avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}
.sb-name { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-role { font-size: 10px; color: var(--accent); font-weight: 700; }
.sb-logout { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; transition: color 0.15s; padding: 2px; }
.sb-logout:hover { color: var(--red); }
.nav { flex: 1; overflow-y: auto; padding: 6px 8px 12px; }
.nav-section { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 1.2px; text-transform: uppercase; padding: 14px 8px 4px; }
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: var(--r-sm);
  cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 500;
  transition: all 0.15s; position: relative; user-select: none;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-item.active::before { content: ""; position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px; background: var(--accent); border-radius: 0 3px 3px 0; }
.nav-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
.nb { /* nav badge */
  margin-left: auto; min-width: 18px; height: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 20px; font-size: 10px; font-weight: 800;
  padding: 0 5px; display: none;
}
.nb.red { background: var(--red); color: #fff; }
.nb.orange { background: var(--accent); color: #fff; }
.nb.green { background: var(--green); color: #000; }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.topbar-left .pg-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.topbar-left .pg-date { font-size: 11px; color: var(--text3); margin-top: 1px; }
.content { flex: 1; overflow-y: auto; padding: 22px 24px; }
.page { display: none; }
.page.active { display: block; }

/* ─── COMPONENTS ─── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 18px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 18px 20px; }
.card-h { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; }
.stat-lbl { font-size: 11px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
.stat-val { font-size: 30px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; border-radius: var(--r-sm); border: none; cursor: pointer; font-family: "DM Sans",sans-serif; font-size: 13px; font-weight: 600; transition: all 0.15s; white-space: nowrap; }
.btn:hover { transform: translateY(-1px); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #fb923c; box-shadow: 0 4px 14px rgba(249,115,22,0.3); }
.btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface3); color: var(--text); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-success { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.25); }
.btn-success:hover { background: rgba(52,211,153,0.22); }
.btn-danger { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }
.btn-danger:hover { background: rgba(248,113,113,0.22); }

/* TASKS */
.task-list { display: flex; flex-direction: column; gap: 7px; }
.task-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 11px 14px;
  display: flex; align-items: center; gap: 10px; transition: all 0.2s;
  cursor: default;
}
.task-item:hover { border-color: var(--border2); }
.task-item.atrasada { border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.04); }
.task-item.feita { opacity: 0.45; }
.chk {
  width: 20px; height: 20px; border-radius: 6px;
  border: 2px solid var(--border2); display: flex; align-items: center;
  justify-content: center; font-size: 11px; flex-shrink: 0;
  cursor: pointer; transition: all 0.2s; color: transparent;
}
.chk:hover:not(.ok) { border-color: var(--green); }
.chk.ok { background: var(--green); border-color: var(--green); color: #000; font-weight: 700; }
.task-info { flex: 1; min-width: 0; }
.task-name { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-name.struck { text-decoration: line-through; color: var(--text3); }
.task-sub { font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
.prio { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.p-high { background: var(--red); }
.p-med { background: var(--yellow); }
.p-low { background: var(--green); }
.chip { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; white-space: nowrap; }
.chip-red { background: rgba(248,113,113,0.15); color: var(--red); }
.chip-yellow { background: rgba(251,191,36,0.15); color: var(--yellow); }
.chip-green { background: rgba(52,211,153,0.1); color: var(--green); }
.chip-blue { background: rgba(91,141,248,0.12); color: var(--blue); }
.chip-orange { background: rgba(249,115,22,0.12); color: var(--accent); }

/* FILTERS */
.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.fchip { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.fchip.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(249,115,22,0.3); }
.fchip:hover:not(.active) { border-color: var(--border2); color: var(--text); }

/* ABSENCE TABLE */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; padding: 7px 12px; font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
.tbl td { padding: 10px 12px; border-bottom: 1px solid rgba(38,45,66,0.5); }
.tbl tr:hover td { background: rgba(255,255,255,0.012); }
.tbl td:first-child { display: flex; align-items: center; gap: 7px; }
.abs-pill { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
.abs-ferias { background: rgba(91,141,248,0.14); color: var(--blue); }
.abs-falta { background: rgba(248,113,113,0.14); color: var(--red); }
.abs-baixa { background: rgba(251,191,36,0.14); color: var(--yellow); }
.s-pill { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.s-pending { background: rgba(251,191,36,0.12); color: var(--yellow); }
.s-approved { background: rgba(52,211,153,0.12); color: var(--green); }
.s-rejected { background: rgba(248,113,113,0.12); color: var(--red); }

/* SUGGESTION CARDS */
.sug-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 14px 16px; margin-bottom: 8px; transition: border-color 0.2s; }
.sug-card:hover { border-color: var(--border2); }
.sug-head { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.sug-body { font-size: 12px; color: var(--text2); line-height: 1.65; }
.sug-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 11px; color: var(--text3); }

/* ALERT OVERDUE */
.overdue-alert {
  background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.3);
  border-radius: var(--r); padding: 14px 16px;
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
}
.overdue-alert .oa-icon { font-size: 22px; flex-shrink: 0; }
.overdue-alert .oa-txt { flex: 1; }
.overdue-alert .oa-title { font-weight: 700; font-size: 13px; color: var(--red); }
.overdue-alert .oa-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* NOTIF ITEMS */
.notif-item { display: flex; gap: 10px; align-items: flex-start; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); margin-bottom: 6px; }
.notif-item.unread { border-color: rgba(249,115,22,0.3); background: rgba(249,115,22,0.04); }
.notif-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.notif-icon { font-size: 20px; flex-shrink: 0; }
.notif-txt { flex: 1; }
.notif-title { font-weight: 600; font-size: 13px; }
.notif-time { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* AVATAR */
.avatar {
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-weight: 700; flex-shrink: 0;
}

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72); backdrop-filter: blur(6px); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 24px; width: 100%; max-width: 500px; box-shadow: var(--shadow-lg); transform: translateY(14px); transition: transform 0.2s; max-height: 90vh; overflow-y: auto; }
.overlay.open .modal { transform: translateY(0); }
.modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { width: 28px; height: 28px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--text2); transition: all 0.15s; }
.modal-close:hover { color: var(--text); }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: 0.5px; margin-bottom: 5px; }
.fg input, .fg select, .fg textarea {
  width: 100%; padding: 9px 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-sm); color: var(--text);
  font-family: "DM Sans",sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--accent); }
.fg textarea { resize: vertical; min-height: 80px; }
.fg select option { background: var(--surface2); }
.fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

/* TOAST */
.toast-wrap { position: fixed; top: 16px; right: 16px; z-index: 500; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--surface); border: 1px solid var(--border2); border-left: 3px solid var(--accent); border-radius: var(--r-sm); padding: 12px 16px; min-width: 260px; max-width: 330px; box-shadow: var(--shadow); animation: tslide 0.3s ease, tfade 0.3s ease 3.7s forwards; pointer-events: all; }
.toast.ok { border-left-color: var(--green); }
.toast.err { border-left-color: var(--red); }
.toast-title { font-weight: 700; font-size: 13px; }
.toast-body { font-size: 11px; color: var(--text2); margin-top: 2px; }
@keyframes tslide { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes tfade { from { opacity: 1; } to { opacity: 0; transform: translateX(110%); } }

/* USER MANAGEMENT */
.user-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(38,45,66,0.5); }
.user-row:last-child { border-bottom: none; }
.user-code { font-family: "DM Mono", monospace; font-size: 13px; font-weight: 500; color: var(--accent); background: var(--accent-dim); padding: 3px 8px; border-radius: 6px; }

/* EMPTY */
.empty { text-align: center; padding: 40px 20px; color: var(--text3); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.empty-txt { font-size: 13px; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- TOASTS -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen">

/* ═══ STATE ═══ */
let ME = null;       // supabase auth user
let PROFILE = null;  // row from profiles
let USERS = [];      // all profiles cache
let CUR_PAGE = "dashboard";

/* ═══ HELPERS ═══ */
const $ = id => document.getElementById(id);
const fmtD = d => d ? new Date(d).toLocaleDateString("pt-PT",{day:"2-digit",month:"short"}) : "–";
const fmtDT = d => d ? new Date(d).toLocaleString("pt-PT") : "–";
const todayISO = () => new Date().toISOString().split("T")[0];
const isOver = (due,done) => { if(done) return false; const t=new Date();t.setHours(0,0,0,0);const d=new Date(due);d.setHours(0,0,0,0);return d<t; };
const isToday = due => { const t=new Date();t.setHours(0,0,0,0);const d=new Date(due);d.setHours(0,0,0,0);return d.getTime()===t.getTime(); };
const userByID = id => USERS.find(u=>u.id===id);
const ini = name => (name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();

function ava(name, color, size=28) {
  const bg = (color||"#f97316")+"22", fg = color||"#f97316";
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${size*0.4}px;background:${bg};color:${fg}">${ini(name)}</div>`;
}
function dueBadge(due,done) {
  if(done) return `<span class="chip chip-green">✓ Feito</span>`;
  if(isOver(due,done)) return `<span class="chip chip-red">Atrasado</span>`;
  if(isToday(due)) return `<span class="chip chip-yellow">Hoje</span>`;
  return `<span class="chip chip-green">${fmtD(due)}</span>`;
}
function absLabel(t) {
  const m={ferias:["abs-ferias","🏖 Férias"],falta:["abs-falta","❌ Falta"],baixa:["abs-baixa","🏥 Baixa"]};
  const [c,l]=m[t]||["",""];
  return `<span class="abs-pill ${c}">${l}</span>`;
}
function statusPill(s) {
  const m={pending:["s-pending","⏳ Pendente"],approved:["s-approved","✓ Aprovado"],rejected:["s-rejected","✗ Rejeitado"]};
  const [c,l]=m[s]||["",""];
  return `<span class="s-pill ${c}">${l}</span>`;
}
function empty(icon,txt) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-txt">${txt}</div></div>`;
}
function toast(title,body="",type="") {
  const w=$("toastWrap"), t=document.createElement("div");
  t.className="toast "+type;
  t.innerHTML=`<div class="toast-title">${title}</div>${body?`<div class="toast-body">${body}</div>`:""}`;
  w.appendChild(t); setTimeout(()=>t.remove(),4400);
}

/* ═══ MODAL ═══ */
function openModal(title, body) {
  $("modalTitle").textContent=title;
  $("modalBody").innerHTML=body;
  $("overlay").classList.add("open");
}
function closeModal() { $("overlay").classList.remove("open"); }
function closeOverlay(e) { if(e.target===$("overlay")) closeModal(); }

/* ═══ LOGIN ═══ */
async function doLogin() {
  const user = $("lUser").value.trim().toLowerCase();
  const pass = $("lPass").value;
  const remember = $("rememberMe").checked;
  const btn = $("btnLogin"), err = $("loginErr");
  err.style.display="none";
  if(!user||!pass) { showErr("Preenche o nome e a password."); return; }
  btn.disabled=true;
  btn.innerHTML=`<span class="spin"></span>A entrar...`;
  const email = user + DOMAIN_SUFFIX;
  const { data, error } = await DB.auth.signInWithPassword({ email, password: pass });
  if(error) {
    btn.disabled=false; btn.innerHTML="Entrar";
    showErr("Nome ou password incorretos."); return;
  }
  ME = data.user;
  if(!remember) {
    // If not remember, set session expiry shorter (handled by Supabase default)
  }
  await bootApp();
}
function showErr(m) { const e=$("loginErr"); e.textContent=m; e.style.display="block"; }

async function checkSession() {
  const { data:{ session } } = await DB.auth.getSession();
  if(session) { ME = session.user; await bootApp(); }
}

async function doLogout() {
  await DB.auth.signOut();
  ME=null; PROFILE=null; USERS=[];
  $("app").style.display="none";
  $("loginScreen").style.display="flex";
  $("lUser").value=""; $("lPass").value="";
  $("loginErr").style.display="none";
  $("btnLogin").disabled=false; $("btnLogin").innerHTML="Entrar";
}

/* ═══ BOOT ═══ */
async function bootApp() {
  $("loginScreen").style.display="none";
  $("app").style.display="block";
  const { data: prof } = await DB.from("profiles").select("*").eq("id",ME.id).single();
  PROFILE = prof;
  const { data: all } = await DB.from("profiles").select("*").order("full_name");
  USERS = all||[];
  const sbAv=$("sbAvatar");
  sbAv.textContent=ini(PROFILE.full_name);
  sbAv.style.background=(PROFILE.color||"#f97316")+"22";
  sbAv.style.color=PROFILE.color||"#f97316";
  $("sbName").textContent=PROFILE.full_name;
  $("sbRole").textContent=PROFILE.is_admin?"Administradora":"Colaborador";
  $("pgDate").textContent=new Date().toLocaleDateString("pt-PT",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  if(PROFILE.is_admin) document.querySelectorAll(".admin-el").forEach(el=>el.style.display="");
  await go("dashboard", document.querySelector(".nav-item.active"));
  await refreshBadges();
}

/* ═══ NAV ═══ */
async function go(page, el) {
  document.querySelectorAll(".nav-item").forEach(e=>e.classList.remove("active"));
  if(el) el.classList.add("active");
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  const pg = $("pg-"+page);
  if(pg) pg.classList.add("active");
  const TITLES={dashboard:"Dashboard",tarefas:"As minhas tarefas",ausencias:"As minhas ausências",sugestoes:"As minhas sugestões","all-tarefas":"Todas as tarefas","all-ausencias":"Pedidos de ausência","all-sugestoes":"Todas as sugestões & erros",utilizadores:"Utilizadores",notificacoes:"Notificações"};
  $("pgTitle").textContent=TITLES[page]||page;
  CUR_PAGE=page;
  $("topAction").innerHTML="";
  await loadPage(page);
}

async function loadPage(p) {
  if(p==="dashboard")       await renderDash();
  else if(p==="tarefas")    await renderMyTasks("todas");
  else if(p==="ausencias")  await renderMyAbs();
  else if(p==="sugestoes")  await renderMySug();
  else if(p==="all-tarefas")     await renderAllTasks("todas");
  else if(p==="all-ausencias")   await renderAllAbs();
  else if(p==="all-sugestoes")   await renderAllSug();
  else if(p==="utilizadores")    await renderUsers();
  else if(p==="notificacoes")    await renderNotifs();
}

/* ═══ BADGES ═══ */
async function refreshBadges() {
  const { count:myP } = await DB.from("tasks").select("id",{count:"exact",head:true}).eq("assigned_to",ME.id).eq("done",false);
  const nb=$("nbTarefas"); if(myP>0){nb.textContent=myP;nb.style.display="";}else nb.style.display="none";
  if(!PROFILE?.is_admin) return;
  const { count:pendAbs } = await DB.from("absences").select("id",{count:"exact",head:true}).eq("status","pending");
  const na=$("nbAus"); if(pendAbs>0){na.textContent=pendAbs;na.style.display="";}else na.style.display="none";
  const { count:unread } = await DB.from("notifications").select("id",{count:"exact",head:true}).eq("read",false);
  const nn=$("nbNotif"); if(unread>0){nn.textContent=unread;nn.style.display="";}else nn.style.display="none";
}

/* ═══ TASK HTML ═══ */
function taskHtml(t, showUser=false) {
  const u = showUser ? userByID(t.assigned_to) : PROFILE;
  const over = isOver(t.due_date, t.done);
  const pMap={high:"p-high",med:"p-med",low:"p-low"};
  const isAdmin = PROFILE?.is_admin;
  return `<div class="task-item ${t.done?"feita":""} ${over?"atrasada":""}">
    <div class="prio ${pMap[t.priority]||"p-med"}" style="margin-top:0;align-self:center"></div>
    <div class="chk ${t.done?"ok":""}" onclick="toggleTask(${t.id},${t.done})">${t.done?"✓":""}</div>
    <div class="task-info">
      <div class="task-name ${t.done?"struck":""}">${t.name}</div>
      <div class="task-sub">
        ${showUser&&u?`<span>${ava(u.full_name||u.name,u.color,16)} <span style="vertical-align:middle">${u.full_name||u.name}</span></span>`:""}
        ${t.done&&t.done_at?`<span style="color:var(--green)">✓ ${fmtD(t.done_at)}</span>`:""}
        ${t.notes?`<span title="${t.notes}">📝</span>`:""}
      </div>
    </div>
    ${dueBadge(t.due_date,t.done)}
    ${isAdmin?`<button class="btn btn-danger btn-sm" style="margin-left:6px" onclick="deleteTask(${t.id})">🗑️</button>`:""}
  </div>`;
}

async function renderDash() {
  if(PROFILE?.is_admin) await renderAdminDash();
  else await renderUserDash();
}

}

async function renderAdminDash() {
  const today = todayISO();
  const { count:tOpen  } = await DB.from("tasks").select("id",{count:"exact",head:true}).eq("done",false);
  const { count:tDone  } = await DB.from("tasks").select("id",{count:"exact",head:true}).eq("done",true);
  const { count:absP   } = await DB.from("absences").select("id",{count:"exact",head:true}).eq("status","pending");
  const { count:sugTot } = await DB.from("suggestions").select("id",{count:"exact",head:true});
  $("dStats").innerHTML=`
    <div class="stat-card"><div class="stat-lbl">Tarefas abertas</div><div class="stat-val" style="color:var(--accent)">${tOpen||0}</div></div>
    <div class="stat-card"><div class="stat-lbl">Concluídas</div><div class="stat-val" style="color:var(--green)">${tDone||0}</div></div>

  } else od.innerHTML="";
  // Recent tasks + pending abs
  const { data:tasks } = await DB.from("tasks").select("*").eq("done",false).order("due_date").limit(5);
  const { data:pendAbs } = await DB.from("absences").select("*,profiles(full_name,color)").eq("status","pending").order("created_at",{ascending:false}).limit(5);
  $("dMain").innerHTML=`<div class="grid2">
    <div class="card"><div class="card-h">📋 Tarefas abertas</div><div class="task-list">${(tasks||[]).map(t=>taskHtml(t,true)).join("")||empty("✅","Sem tarefas abertas")}</div></div>
    <div class="card"><div class="card-h">📨 Ausências pendentes</div>
    ${(pendAbs||[]).length===0?empty("🎉","Nenhum pedido pendente"):(pendAbs||[]).map(a=>`
      <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">

          <button class="btn btn-success btn-sm" onclick="approveAbs(${a.id})">✓</button>
          <button class="btn btn-danger btn-sm" onclick="rejectAbs(${a.id})">✗</button>

      </div>`).join("")}

  </div>`;

/* ═══ MY TASKS ═══ */
async function renderMyTasks(filter) {
  let q = DB.from("tasks").select("*").eq("assigned_to",ME.id).order("due_date");
  const today = todayISO();
  if(filter==="pendentes") q=q.eq("done",false);
  else if(filter==="concluidas") q=q.eq("done",true);
  else if(filter==="urgentes") q=q.eq("done",false).eq("priority","high");
  const { data } = await q;
  $("myTaskList").innerHTML=(data||[]).map(t=>taskHtml(t)).join("")||empty("✅","Sem tarefas nesta categoria");
  $("topAction").innerHTML="";
}

function filterT(f,el) {
  document.querySelectorAll("#fTarefas .fchip").forEach(c=>c.classList.remove("active")); el?.classList.add("active");
  renderMyTasks(f);
}

/* ═══ TOGGLE TASK ═══ */
async function toggleTask(id, wasDone) {
  const done=!wasDone;
  const { data:t } = await DB.from("tasks").update({done,done_at:done?new Date().toISOString():null}).eq("id",id).select().single();
  if(done) {
    const msg=`${PROFILE.full_name} concluiu "${t.name}"`;
    await DB.from("notifications").insert({message:msg,type:"task_done",related_id:id});
    toast("✅ Tarefa concluída!",t.name,"ok");
  }
  await refreshBadges();
  await loadPage(CUR_PAGE);
}

/* ═══ ALL TASKS (admin) ═══ */
async function renderAllTasks(filter) {
  const today=todayISO();
  let q=DB.from("tasks").select("*").order("due_date");
  if(filter==="pendentes") q=q.eq("done",false);
  else if(filter==="concluidas") q=q.eq("done",true);
  else if(filter==="atrasadas") q=q.eq("done",false).lt("due_date",today);
  const { data } = await q;
  $("allTaskList").innerHTML=(data||[]).map(t=>taskHtml(t,true)).join("")||empty("✅","Sem tarefas");
  // overdue hint
  const { data:ov } = await DB.from("tasks").select("id").eq("done",false).lt("due_date",today);
  const el=$("atOverdue");
  if(ov?.length>0&&filter!=="atrasadas"){
    el.innerHTML=`<div class="overdue-alert" style="margin-bottom:12px"><div class="oa-icon">🚨</div><div class="oa-txt"><div class="oa-title">${ov.length} atrasada${ov.length>1?"s":""}</div></div><button class="btn btn-ghost btn-sm" onclick="filterAllT('atrasadas',null)">Filtrar →</button></div>`;
  } else el.innerHTML="";
  $("topAction").innerHTML=`<button class="btn btn-primary" onclick="openNewTask()">+ Nova tarefa</button>`;
}

function filterAllT(f,el) {
  document.querySelectorAll("#fAllT .fchip").forEach(c=>c.classList.remove("active")); el?.classList.add("active");
  renderAllTasks(f);
}

      ${(data||[]).map(a=>`<tr>
        <td>${absLabel(a.absence_type)}</td>

    </div>`:""}
    <div class="card"><div class="card-h">📋 Historial completo</div>
      <table class="tbl"><thead><tr><th>Colaborador</th><th>Tipo</th><th>Início</th><th>Fim</th><th>Estado</th></tr></thead><tbody>
      ${(data||[]).map(a=>`<tr>
        <td>${ava(a.profiles?.full_name,a.profiles?.color,22)} ${a.profiles?.full_name||"?"}</td>
        <td>${absLabel(a.absence_type)}</td><td>${fmtD(a.start_date)}</td><td>${fmtD(a.end_date)}</td>
        <td>${statusPill(a.status)}</td>

      </tbody></table>
    </div>`;
}

async function approveAbs(id) { await DB.from("absences").update({status:"approved"}).eq("id",id); toast("✓ Aprovado","","ok"); await refreshBadges(); await loadPage(CUR_PAGE); }
async function rejectAbs(id) { await DB.from("absences").update({status:"rejected"}).eq("id",id); toast("✗ Rejeitado","","err"); await refreshBadges(); await loadPage(CUR_PAGE); }

/* ═══ MY SUGGESTIONS ═══ */
async function renderMySug() {
  const { data } = await DB.from("suggestions").select("*").eq("user_id",ME.id).order("created_at",{ascending:false});
  $("mySugContent").innerHTML=`
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="btn btn-primary" onclick="openNewSug()">+ Submeter sugestão</button>
    </div>
    ${(data||[]).map(s=>sugCard(s,false)).join("")||empty("💡","Ainda não submeteste sugestões")}`;

/* ═══ ALL SUGGESTIONS (admin) ═══ */
async function renderAllSug() {
  const { data } = await DB.from("suggestions").select("*,profiles(full_name,color)").order("created_at",{ascending:false});
  $("allSugContent").innerHTML=(data||[]).map(s=>sugCard(s,true)).join("")||empty("💡","Sem sugestões submetidas");
}

function sugCard(s, showUser) {
  const typeClass=s.suggestion_type==="melhoria"?"chip-orange":"chip-red";
  const typeLabel=s.suggestion_type==="melhoria"?"💡 Melhoria":"🔴 Erro de processo";
  const u = showUser && s.profiles;
  return `<div class="sug-card">
    <div class="sug-head">
      <span class="chip ${typeClass}">${typeLabel}</span>
      <div style="font-weight:700;font-size:13px;flex:1">${s.title}</div>
    </div>
    <div class="sug-body">${s.description}</div>
    <div class="sug-foot">
      <div style="display:flex;align-items:center;gap:6px">${u?ava(u.full_name||u.name,u.color,18)+"<span>"+(u.full_name||u.name)+"</span>":""}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span>${fmtD(s.created_at)}</span>
        ${PROFILE?.is_admin?`<button class="btn btn-danger btn-sm" onclick="deleteSuggestion(${s.id})">🗑️</button>`:""}
      </div>
    </div>
  </div>`;
}

/* ═══ USERS (admin) ═══ */

async function deleteTask(id) {
  if(!confirm("Eliminar esta tarefa?")) return;
  await DB.from("tasks").delete().eq("id",id);
  toast("🗑️ Tarefa eliminada","","err");
  await loadPage(CUR_PAGE);
}

async function deleteAbsence(id) {
  if(!confirm("Eliminar este pedido de ausência?")) return;
  await DB.from("absences").delete().eq("id",id);
  toast("🗑️ Ausência eliminada","","err");
  await loadPage(CUR_PAGE);
}

async function deleteSuggestion(id) {
  if(!confirm("Eliminar esta sugestão?")) return;
  await DB.from("suggestions").delete().eq("id",id);
  toast("🗑️ Sugestão eliminada","","err");
  await loadPage(CUR_PAGE);
}

async function renderUsers() {
  const { data:users } = await DB.from("profiles").select("*").order("full_name");
  $("usersContent").innerHTML=`
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <div style="font-weight:700;font-size:15px">Utilizadores (${(users||[]).length})</div>
        <button class="btn btn-primary btn-sm" onclick="openNewUser()">+ Novo utilizador</button>
      </div>
      ${(users||[]).map(u=>`<div class="user-row">
        ${ava(u.full_name,u.color,38)}
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px">${u.full_name||u.name}${u.is_admin?` <span class="chip chip-orange" style="font-size:10px">Admin</span>`:""}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px">
            <span class="user-code">${u.username||"–"}</span>
            <span style="margin-left:8px;color:var(--text3)">${u.is_admin?"Acesso total":"Colaborador"}</span>
          </div>
        </div>
        ${!u.is_admin?`
          <div style="display:flex;gap:4px;align-items:center">
            ${u.pending?`<span style="font-size:10px;background:rgba(251,191,36,0.15);color:var(--yellow);padding:2px 7px;border-radius:20px;margin-right:4px">⏳ Ainda não entrou</span>`:""}
            <button class="btn btn-danger btn-sm" onclick="confirmDelUser('${u.id}','${u.full_name||u.name}')">🗑️</button>
          </div>`:`<span style="font-size:11px;color:var(--text3)">Protegida</span>`}
      </div>`).join("")}
    </div>
    <div class="card">
      <div class="card-h">ℹ️ Permissões</div>
      <div class="grid2" style="margin-top:4px">
        <div style="background:rgba(249,115,22,0.07);border:1px solid rgba(249,115,22,0.2);border-radius:8px;padding:14px">
          <div style="font-weight:700;font-size:12px;color:var(--accent);margin-bottom:8px">👑 Administradora (Sara)</div>
          <div style="font-size:11px;color:var(--text2);line-height:1.9">✓ Criar e atribuir tarefas<br>✓ Aprovar ausências<br>✓ Ver dados de toda a equipa<br>✓ Gerir utilizadores<br>✓ Receber notificações</div>
        </div>
        <div style="background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.2);border-radius:8px;padding:14px">
          <div style="font-weight:700;font-size:12px;color:var(--green);margin-bottom:8px">👤 Colaboradores</div>
          <div style="font-size:11px;color:var(--text2);line-height:1.9">✓ Ver e picar as suas tarefas<br>✓ Pedir férias / falta / baixa<br>✓ Submeter sugestões<br>✗ Ver dados de outros<br>✗ Gerir utilizadores</div>
        </div>
      </div>
    </div>`;
}

function openNewUser() {
  const colors=["#f97316","#5b8df8","#34d399","#f87171","#fbbf24","#a78bfa","#06b6d4","#ec4899"];
  openModal("Novo utilizador",`
    <div style="background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text2);margin-bottom:14px">
      💡 A Sara adiciona o nome — o colaborador <strong style="color:var(--text)">define a sua própria password</strong> quando entra pela primeira vez.
    </div>
    <div class="fg"><label>Nome completo</label><input id="nu-name" placeholder="Ex: Marta Silva" /></div>
    <div class="fg"><label>Nome de utilizador (para entrar na app)</label><input id="nu-user" placeholder="ex: marta" autocapitalize="none" spellcheck="false" /></div>
    <div class="fg"><label>Cor de identificação</label>
      <div style="display:flex;gap:8px;margin-top:5px" id="colorPicker">
        ${colors.map((c,i)=>`<div onclick="pickColor('${c}',this)" style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${i===0?"white":"transparent"};transition:all 0.15s"></div>`).join("")}
      </div>
      <input type="hidden" id="nu-color" value="#f97316" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="createUser()">Criar utilizador</button>
    </div>`);
}

function pickColor(c,el){
  document.querySelectorAll("#colorPicker div").forEach(e=>{e.style.borderColor="transparent";e.style.transform="scale(1)"});
  el.style.borderColor="white"; el.style.transform="scale(1.2)";
  $("nu-color").value=c;
}

async function createUser() {
  const name=$("nu-name").value.trim();
  const username=$("nu-user").value.trim().toLowerCase().replace(/[^a-z0-9._-]/g,"");
  const color=$("nu-color").value;
  if(!name||!username){toast("⚠️ Preenche o nome e o utilizador","","err");return;}
  if(USERS.find(u=>u.username===username)){toast("⚠️ Nome já existe","Escolhe outro nome de utilizador","err");return;}
  // Criar com password temporária — utilizador vai definir a sua na 1ª entrada
  const tempPass = "Irmarfer2024!";
  const email=username+DOMAIN_SUFFIX;
  const { data, error } = await DB.auth.signUp({email,password:tempPass,options:{data:{full_name:name,username,color}}});
  if(error){toast("❌ Erro ao criar",""+error.message,"err");return;}
  if(data.user){
    // Insert profile with name column (required by existing table)
    await DB.from("profiles").upsert({
      id:data.user.id, name:name, full_name:name, email, username, color, is_admin:false, is_active:true, pending:true
    });
    USERS=[...USERS,{id:data.user.id,full_name:name,name:name,email,username,color,is_admin:false,is_active:true,pending:true}]; allUsers=USERS;
    toast("✅ Utilizador criado!",`${name} entra com "${username}" e password: Irmarfer2024!`,"ok");
    closeModal(); await renderUsers();
  }
}

async function confirmDelUser(id,name) {
  openModal("Remover utilizador",`
    <div style="text-align:center;padding:8px 0 20px">
      <div style="font-size:40px;margin-bottom:12px">⚠️</div>
      <div style="font-weight:700;font-size:15px;margin-bottom:8px">Remover ${name}?</div>
      <div style="font-size:13px;color:var(--text2)">O acesso será removido.<br>Os dados ficam arquivados.</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="deleteUser('${id}','${name}')">🗑️ Remover</button>
    </div>`);
}

async function deleteUser(id,name) {
  await DB.from("profiles").update({is_active:false}).eq("id",id);
  USERS=USERS.filter(u=>u.id!==id);
  toast("🗑️ Removido",name+" foi removido.","err");
  closeModal(); await renderUsers();
}

/* ═══ NOTIFICATIONS ═══ */
async function renderNotifs() {
  const { data } = await DB.from("notifications").select("*").order("created_at",{ascending:false}).limit(60);
  const unread=(data||[]).filter(n=>!n.read).length;
  $("notifContent").innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-size:13px;color:var(--text2)">${unread} não lida${unread!==1?"s":""}</div>
      <button class="btn btn-ghost btn-sm" onclick="markAllRead()">Marcar todas como lidas</button>
    </div>
    ${(data||[]).map(n=>`<div class="notif-item ${n.read?"":"unread"}">
      <div class="notif-icon">${n.type==="task_done"?"✅":n.type==="absence"?"📨":"💡"}</div>
      <div class="notif-txt">
        <div class="notif-title">${n.message}</div>
        <div class="notif-time">${fmtDT(n.created_at)}</div>
      </div>
      ${!n.read?'<div class="notif-dot"></div>':""}
    </div>`).join("")||empty("🔔","Sem notificações")}`;
}

async function markAllRead() {
  await DB.from("notifications").update({read:true}).eq("read",false);
  toast("✓ Todas lidas","","ok"); await refreshBadges(); await renderNotifs();
}

/* ═══ MODALS: NEW TASK / ABS / SUG ═══ */
function openNewTask(preUser) {
  const opts=USERS.filter(u=>!u.is_admin).map(u=>`<option value="${u.id}"${u.id===preUser?" selected":""}>${u.full_name} (${u.username||"?"})</option>`).join("");
  const tomISO=()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().split("T")[0];};
  openModal("Nova tarefa",`
    <div class="fg"><label>Descrição</label><input id="tName" placeholder="Ex: Rever relatório de vendas Q1..." /></div>
    <div class="fg2">
      <div class="fg"><label>Atribuir a</label><select id="tUser">${opts}</select></div>
      <div class="fg"><label>Prioridade</label><select id="tPrio"><option value="high">🔴 Alta</option><option value="med" selected>🟡 Média</option><option value="low">🟢 Baixa</option></select></div>
    </div>
    <div class="fg"><label>Data limite</label><input type="date" id="tDue" value="${tomISO()}" /></div>
    <div class="fg"><label>Notas (opcional)</label><textarea id="tNotes" placeholder="Detalhes adicionais..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveTask()">Criar tarefa</button>
    </div>`);
}

async function saveTask() {
  const name=$("tName").value.trim();
  if(!name){toast("⚠️ Escreve a descrição","","err");return;}
  const {error}=await DB.from("tasks").insert({name,assigned_to:$("tUser").value,priority:$("tPrio").value,due_date:$("tDue").value,notes:$("tNotes").value,done:false});
  if(error){toast("❌ Erro",""+error.message,"err");return;}
  toast("✅ Tarefa criada!","","ok"); closeModal(); await refreshBadges(); await loadPage(CUR_PAGE);
}

function openNewAbs() {
  const today=todayISO();
  openModal("Pedir ausência",`
    <div class="fg2">
      <div class="fg"><label>Tipo</label><select id="aType"><option value="ferias">🏖 Férias</option><option value="falta">❌ Falta</option><option value="baixa">🏥 Baixa</option></select></div>
      <div class="fg"><label>Período</label><select id="aPer"><option value="dia inteiro">Dia inteiro</option><option value="manhã">Manhã</option><option value="tarde">Tarde</option></select></div>
    </div>
    <div class="fg2">
      <div class="fg"><label>Data início</label><input type="date" id="aStart" value="${today}" /></div>
      <div class="fg"><label>Data fim</label><input type="date" id="aEnd" value="${today}" /></div>
    </div>
    <div class="fg"><label>Nota (opcional)</label><textarea id="aNotes" placeholder="Motivo ou observação..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveAbs()">Enviar pedido</button>
    </div>`);
}

async function saveAbs() {
  const start=$("aStart").value, end=$("aEnd").value;
  if(!start||!end){toast("⚠️ Preenche as datas","","err");return;}
  const {error}=await DB.from("absences").insert({user_id:ME.id,absence_type:$("aType").value,start_date:start,end_date:end,period:$("aPer").value,notes:$("aNotes").value,status:"pending"});
  if(error){toast("❌ Erro",""+error.message,"err");return;}
  const msg=`${PROFILE.full_name} submeteu ausência (${$("aType").value}) — ${fmtD(start)}${start!==end?" a "+fmtD(end):""}`;
  await DB.from("notifications").insert({message:msg,type:"absence"});
  toast("✅ Pedido enviado!","A Sara irá aprovar em breve.","ok");
  closeModal(); await refreshBadges(); await loadPage(CUR_PAGE);
}

function openNewSug() {
  openModal("Submeter sugestão",`
    <div class="fg"><label>Tipo</label><select id="sType"><option value="melhoria">💡 Melhoria de processo</option><option value="erro">🔴 Identificação de erro</option></select></div>
    <div class="fg"><label>Título</label><input id="sTitle" placeholder="Resume a tua ideia..." /></div>
    <div class="fg"><label>Descrição</label><textarea id="sDesc" placeholder="Descreve o problema ou a melhoria que propões..." style="min-height:110px"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSug()">Submeter</button>
    </div>`);
}

async function saveSug() {
  const title=$("sTitle").value.trim(), desc=$("sDesc").value.trim();
  if(!title||!desc){toast("⚠️ Preenche todos os campos","","err");return;}
  const {error}=await DB.from("suggestions").insert({user_id:ME.id,suggestion_type:$("sType").value,title,description:desc});
  if(error){toast("❌ Erro",""+error.message,"err");return;}
  const msg=`${PROFILE.full_name} submeteu: "${title}"`;
  await DB.from("notifications").insert({message:msg,type:"suggestion"});
  toast("✅ Sugestão enviada!","Obrigada pelo contributo!","ok");
  closeModal(); await refreshBadges(); await loadPage(CUR_PAGE);
}

document.addEventListener("keydown", e=>{
  if(e.key==="Enter" && $("loginScreen").style.display!=="none") doLogin();
  if(e.key==="Escape") closeModal();
});

checkSession();
