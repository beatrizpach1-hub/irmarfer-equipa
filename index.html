<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestãoFrota</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --surface: #111318;
  --surface2: #181c24;
  --surface3: #1f2433;
  --border: #1e2535;
  --border2: #262f45;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --accent-dim: rgba(59,130,246,0.1);
  --accent-glow: rgba(59,130,246,0.2);
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --orange: #f97316;
  --purple: #a855f7;
  --teal: #14b8a6;
  --text: #e2e8f0;
  --text2: #64748b;
  --text3: #334155;
  --r: 12px;
  --r-sm: 8px;
  --sidebar-w: 260px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.7);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* LAYOUT */
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.sb-brand-icon{width:38px;height:38px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.sb-brand-name{font-family:"Syne",sans-serif;font-size:16px;font-weight:800;letter-spacing:-0.3px;color:var(--text)}
.sb-brand-sub{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.nav{flex:1;overflow-y:auto;padding:10px 8px}
.nav-section{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:12px 10px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all 0.15s;position:relative;user-select:none;margin-bottom:1px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent2)}
.nav-item.active::before{content:"";position:absolute;left:0;top:15%;bottom:15%;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-icon{font-size:17px;width:24px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;min-width:20px;height:20px;background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 5px}
.nav-badge.warn{background:var(--yellow)}
.nav-badge.ok{background:var(--green)}

.sb-footer{padding:12px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.pg-title{font-family:"Syne",sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.5px}
.pg-sub{font-size:11px;color:var(--text2);margin-top:2px}
.content{flex:1;overflow-y:auto;padding:22px 24px}
.page{display:none}
.page.active{display:block}

/* COMPONENTS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
.card-h{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.blue::before{background:var(--accent)}
.stat-card.green::before{background:var(--green)}
.stat-card.yellow::before{background:var(--yellow)}
.stat-card.red::before{background:var(--red)}
.stat-card.purple::before{background:var(--purple)}
.stat-lbl{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500}
.stat-val{font-family:"Syne",sans-serif;font-size:32px;font-weight:700;letter-spacing:-1.5px;line-height:1}
.stat-icon{position:absolute;right:16px;top:14px;font-size:28px;opacity:0.15}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;transition:all 0.15s;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#2563eb;box-shadow:0 4px 16px rgba(59,130,246,0.35)}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface3);color:var(--text)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.btn-danger{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
.btn-success{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
.btn-warn{background:rgba(245,158,11,0.12);color:var(--yellow);border:1px solid rgba(245,158,11,0.25)}

/* PILLS */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.pill-green{background:rgba(34,197,94,0.12);color:var(--green)}
.pill-yellow{background:rgba(245,158,11,0.12);color:var(--yellow)}
.pill-red{background:rgba(239,68,68,0.12);color:var(--red)}
.pill-blue{background:rgba(59,130,246,0.12);color:var(--accent2)}
.pill-purple{background:rgba(168,85,247,0.12);color:var(--purple)}
.pill-teal{background:rgba(20,184,166,0.12);color:var(--teal)}
.pill-gray{background:rgba(100,116,139,0.12);color:var(--text2)}

/* VEHICLE CARD */
.vehicle-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:all 0.2s;cursor:pointer;position:relative;overflow:hidden}
.vehicle-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.vehicle-card-accent{position:absolute;top:0;left:0;right:0;height:3px}
.vc-type{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.vc-name{font-family:"Syne",sans-serif;font-size:15px;font-weight:700;margin-bottom:2px;letter-spacing:-0.3px}
.vc-plate{font-family:"DM Mono",monospace;font-size:12px;color:var(--text2);background:var(--surface2);padding:2px 7px;border-radius:5px;display:inline-block;margin-bottom:10px}
.vc-alerts{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.vc-meta{display:flex;gap:12px;font-size:11px;color:var(--text2);margin-top:8px}

/* ALERT CARD */
.alert-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px;transition:all 0.15s}
.alert-item:hover{border-color:var(--border2)}
.alert-item.urgent{border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.04)}
.alert-item.soon{border-color:rgba(245,158,11,0.25);background:rgba(245,158,11,0.03)}
.alert-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.alert-info{flex:1;min-width:0}
.alert-title{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert-sub{font-size:11px;color:var(--text2);margin-top:2px}
.alert-days{font-family:"Syne",sans-serif;font-size:18px;font-weight:700;flex-shrink:0;text-align:right}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:560px;box-shadow:var(--shadow-lg);transform:translateY(16px);transition:transform 0.2s;max-height:90vh;overflow-y:auto}
.overlay.open .modal{transform:translateY(0)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-family:"Syne",sans-serif;font-size:17px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text2);transition:all 0.15s}
.modal-close:hover{color:var(--text)}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--text2);letter-spacing:0.5px;margin-bottom:5px;text-transform:uppercase}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:"DM Sans",sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:70px}
.fg select option{background:var(--surface2)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.section-sep{height:1px;background:var(--border);margin:16px 0}
.fg-label-inline{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 12px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--surface2)}
.tbl td{padding:11px 12px;border-bottom:1px solid rgba(30,37,53,0.6)}
.tbl tr:hover td{background:rgba(255,255,255,0.01)}

/* TOAST */
.toast-wrap{position:fixed;top:16px;right:16px;z-index:600;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border2);border-left:3px solid var(--accent);border-radius:var(--r-sm);padding:12px 16px;min-width:280px;max-width:340px;box-shadow:var(--shadow);animation:tslide 0.3s ease,tfade 0.3s ease 3.7s forwards;pointer-events:all}
.toast.ok{border-left-color:var(--green)}.toast.err{border-left-color:var(--red)}.toast.warn{border-left-color:var(--yellow)}
.toast-title{font-weight:700;font-size:13px}
.toast-body{font-size:11px;color:var(--text2);margin-top:2px}
@keyframes tslide{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tfade{from{opacity:1}to{opacity:0;transform:translateX(110%)}}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.4}
.empty-txt{font-size:13px}

/* MAINTENANCE LOG */
.maint-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.maint-item:last-child{border-bottom:none}
.maint-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.maint-info{flex:1}
.maint-title{font-weight:600;font-size:13px}
.maint-meta{font-size:11px;color:var(--text2);margin-top:2px}
.maint-cost{font-family:"DM Mono",monospace;font-size:12px;font-weight:600;color:var(--text);flex-shrink:0;text-align:right}

/* PROGRESS BAR */
.prog-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:3px;transition:width 0.5s ease}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>

</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────

  get(k){ try{ return JSON.parse(localStorage.getItem('frota_'+k)||'null'); }catch{ return null; } },
  set(k,v){ localStorage.setItem('frota_'+k, JSON.stringify(v)); },
};

function loadData(k, def){ return STORE.get(k) ?? def; }
function saveData(k,v){ STORE.set(k,v); }

// ── HELPERS ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmtD = d => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const fmtM = n => n != null ? n.toLocaleString('pt-PT')+'€' : '—';
const fmtKM = k => k != null ? k.toLocaleString('pt-PT')+' km' : '—';
const todayISO = () => new Date().toISOString().split('T')[0];
const nextID = arr => arr.length ? Math.max(...arr.map(x=>x.id))+1 : 1;

function daysUntil(dateStr){
  if(!dateStr) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(dateStr+'T00:00:00');
  return Math.round((d-t)/(1000*60*60*24));
}

function veiculoByID(id){ return VEICULOS.find(v=>v.id===id); }
function veiculoNome(id){ const v=veiculoByID(id); return v ? `${v.nome} (${v.matricula})` : '—'; }

function tipoLabel(t){
  const m={camiao:'🚛 Camião',comercial:'🚐 Comercial',empilhador:'🏗️ Empilhador',diretor:'🚙 Diretor'};
  return m[t]||t;
}
function tipoColor(t){
  const m={camiao:'#3b82f6',comercial:'#22c55e',empilhador:'#f59e0b',diretor:'#a855f7'};
  return m[t]||'#64748b';
}

function daysPill(days){
  if(days === null) return '';
  if(days < 0) return `<span class="pill pill-red">⚠ Expirado há ${Math.abs(days)}d</span>`;
  if(days <= 14) return `<span class="pill pill-red">🔴 ${days}d</span>`;
  if(days <= 45) return `<span class="pill pill-yellow">🟡 ${days}d</span>`;
  return `<span class="pill pill-green">✓ ${days}d</span>`;
}

function empty(icon, txt){ return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-txt">${txt}</div></div>`; }

function toast(title, body='', type=''){
  const w=$('toastWrap'), t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML=`<div class="toast-title">${title}</div>${body?`<div class="toast-body">${body}</div>`:''}`;
  w.appendChild(t); setTimeout(()=>t.remove(), 4400);
}

// ── ALERTS ENGINE ─────────────────────────────────────────────────────────────
function getAllAlerts(){
  const alerts = [];
  const hoje = todayISO();

  INSPECOES.forEach(i => {
    if(!i.proxima) return;
    const d = daysUntil(i.proxima);
    const v = veiculoByID(i.veiculo_id);
    if(d !== null && d <= 90){
      alerts.push({tipo:'inspecao', urgency: d<=14?'urgent':d<=45?'soon':'ok', days:d, veiculo:v?.nome||'?', matricula:v?.matricula||'', descricao:`Inspeção`, data:i.proxima, icon:'✅', id:i.id, tabela:'inspecao'});
    }
  });

  SEGUROS.forEach(s => {
    if(!s.fim) return;
    const d = daysUntil(s.fim);
    const v = veiculoByID(s.veiculo_id);
    if(d !== null && d <= 90){
      alerts.push({tipo:'seguro', urgency: d<=14?'urgent':d<=45?'soon':'ok', days:d, veiculo:v?.nome||'?', matricula:v?.matricula||'', descricao:`Seguro ${s.tipo} — ${s.seguradora}`, data:s.fim, icon:'🛡️', id:s.id, tabela:'seguro'});
    }
  });

  // Custom alerts
  ALERTAS_CONFIG.forEach(a => {
    const d = daysUntil(a.data_alerta);
    const v = veiculoByID(a.veiculo_id);
    if(d !== null){
      alerts.push({tipo:'custom', urgency: d<=0?'urgent':d<=14?'soon':'ok', days:d, veiculo:v?.nome||'Geral', matricula:v?.matricula||'', descricao:a.descricao, data:a.data_alerta, icon:a.icon||'🔔', id:a.id, tabela:'custom'});
    }
  });

  alerts.sort((a,b) => a.days - b.days);
  return alerts;
}

function updateAlertBadge(){
  const alerts = getAllAlerts().filter(a => a.urgency !== 'ok');
  const nb = $('nbAlertas');
  if(alerts.length > 0){
    nb.textContent = alerts.length;
    nb.style.display = 'flex';
    nb.className = 'nav-badge' + (alerts.some(a=>a.urgency==='urgent') ? '' : ' warn');
  } else {
    nb.style.display = 'none';
  }
}

let CUR_PAGE = 'dashboard';

function go(page, el){
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));

function alertItemHtml(a){
  const bg = a.urgency==='urgent'?'rgba(239,68,68,0.12)':a.urgency==='soon'?'rgba(245,158,11,0.1)':'rgba(34,197,94,0.08)';

  const dLabel = a.days < 0 ? `Expirado há ${Math.abs(a.days)}d` : a.days === 0 ? 'Hoje!' : `${a.days} dias`;
  return `<div class="alert-item ${a.urgency==='urgent'?'urgent':a.urgency==='soon'?'soon':''}">
    <div class="alert-icon" style="background:${bg}">${a.icon}</div>
    <div class="alert-info">
      <div class="alert-title">${a.descricao}</div>
      <div class="alert-sub">${a.veiculo}${a.matricula?' · '+a.matricula:''} · ${fmtD(a.data)}</div>
    </div>
    <div class="alert-days" style="color:${col}">${dLabel}</div>
  </div>`;
}

// ── RENOVAR ───────────────────────────────────────────────────────────────────
function addYears(dateStr, years){
  if(!dateStr) return null;
  const d = new Date(dateStr+'T00:00:00');
  d.setFullYear(d.getFullYear() + years);
  return d.toISOString().split('T')[0];
}

function renovarAlerta(id){
  const a = ALERTAS_CONFIG.find(x=>x.id===id);
  if(!a) return;
  const nova = addYears(a.data_alerta, 1);
  if(!nova) return;
  openModal('Renovar Alerta', `
    <div style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:600;margin-bottom:8px">${a.descricao}</div>
      <div style="font-size:12px;color:var(--text2)">Data atual: <b>${fmtD(a.data_alerta)}</b></div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">Nova data sugerida: <b>${fmtD(nova)}</b></div>
    </div>
    <div class="fg"><label>Confirmar nova data do alerta</label><input type="date" id="ren-data" value="${nova}"/></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarRenovarAlerta(${id})">🔄 Renovar</button>
    </div>`);
}
function confirmarRenovarAlerta(id){
  const a = ALERTAS_CONFIG.find(x=>x.id===id);
  if(!a) return;
  a.data_alerta = $('ren-data').value;
  saveData('alertas_config', ALERTAS_CONFIG);
  toast('🔄 Alerta renovado!', fmtD(a.data_alerta), 'ok');
  closeModal(); updateAlertBadge(); renderAlertas();
}

function renovarInspecao(id){
  const i = INSPECOES.find(x=>x.id===id);
  if(!i) return;
  const nova = addYears(i.proxima, 2);
  openModal('Renovar Inspeção', `
    <div style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:600;margin-bottom:8px">${veiculoNome(i.veiculo_id)}</div>
      <div style="font-size:12px;color:var(--text2)">Próxima inspeção atual: <b>${fmtD(i.proxima)}</b></div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">Nova data sugerida: <b>${fmtD(nova)}</b></div>
    </div>
    <div class="fg"><label>Data da inspeção realizada</label><input type="date" id="ri-feita" value="${todayISO()}"/></div>
    <div class="fg2">
      <div class="fg"><label>Nova data da próxima inspeção</label><input type="date" id="ri-prox" value="${nova}"/></div>
      <div class="fg"><label>Resultado</label><select id="ri-res"><option value="Aprovado">✅ Aprovado</option><option value="Reprovado">❌ Reprovado</option><option value="Condicionado">⚠️ Condicionado</option></select></div>
    </div>
    <div class="fg"><label>Local</label><input id="ri-local" value="${i.local||''}"/></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarRenovarInspecao(${id})">🔄 Renovar</button>
    </div>`);
}

  const i = INSPECOES.find(x=>x.id===id);
  if(!i) return;
  i.data_inspecao = $('ri-feita').value;
  i.proxima = $('ri-prox').value;
  i.resultado = $('ri-res').value;
  i.local = $('ri-local').value;
  saveData('inspecoes', INSPECOES);
  toast('🔄 Inspeção renovada!', fmtD(i.proxima), 'ok');
  closeModal(); updateAlertBadge(); renderInspecoes();
}

function renovarSeguro(id){
  const s = SEGUROS.find(x=>x.id===id);
  if(!s) return;
  const novoIni = s.fim || todayISO();
  const novoFim = addYears(novoIni, 1);
  openModal('Renovar Seguro', `
    <div style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:600;margin-bottom:8px">${s.seguradora} — ${s.tipo}</div>
      <div style="font-size:12px;color:var(--text2)">${veiculoNome(s.veiculo_id)}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">Fim atual: <b>${fmtD(s.fim)}</b></div>
    </div>
    <div class="fg2">
      <div class="fg"><label>Novo início</label><input type="date" id="rs-ini" value="${novoIni}"/></div>
      <div class="fg"><label>Novo fim / Renovação</label><input type="date" id="rs-fim" value="${novoFim}"/></div>
    </div>
    <div class="fg"><label>Novo Prémio Anual (€)</label><input type="number" id="rs-premio" value="${s.premio||''}" step="0.01"/></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarRenovarSeguro(${id})">🔄 Renovar</button>
    </div>`);
}
function confirmarRenovarSeguro(id){
  const s = SEGUROS.find(x=>x.id===id);
  if(!s) return;
  s.inicio = $('rs-ini').value;
  s.fim = $('rs-fim').value;
  s.premio = parseFloat($('rs-premio').value)||s.premio;
  saveData('seguros', SEGUROS);
  toast('🔄 Seguro renovado!', fmtD(s.fim), 'ok');
  closeModal(); updateAlertBadge(); renderSeguros();
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(title, body){ $('modalTitle').textContent=title; $('modalBody').innerHTML=body; $('overlay').classList.add('open'); }
function closeModal(){ $('overlay').classList.remove('open'); }
function closeOverlay(e){ if(e.target===$('overlay')) closeModal(); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

// ── INIT ──────────────────────────────────────────────────────────────────────
updateAlertBadge();
renderDash();
</script>
</body>
</html>
